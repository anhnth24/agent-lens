<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AgentLens — Claude Code sessions</title>
<style>
  :root {
    --bg:#0f1419; --panel:#161b22; --panel2:#1c232c; --border:#2a323c;
    --fg:#d7dce2; --muted:#8b949e; --accent:#58a6ff; --in:#3fb950; --out:#d29922; --cache:#a371f7;
  }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
         background:var(--bg); color:var(--fg); }
  header { padding:12px 18px; border-bottom:1px solid var(--border); background:var(--panel);
           display:flex; align-items:center; gap:18px; flex-wrap:wrap; position:sticky; top:0; z-index:5; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header h1 small { color:var(--muted); font-weight:400; }
  .totals { display:flex; gap:14px; flex-wrap:wrap; margin-left:auto; }
  .stat { background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:6px 12px; }
  .stat .k { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
  .stat .v { font-size:16px; font-weight:600; }
  .tin { color:var(--in); } .tout { color:var(--out); } .tcache { color:var(--cache); }
  .layout { display:grid; grid-template-columns:300px 1fr; min-height:calc(100vh - 58px); }
  aside { border-right:1px solid var(--border); background:var(--panel); overflow:auto; }
  aside h2 { font-size:12px; text-transform:uppercase; color:var(--muted); padding:12px 14px 4px; margin:0; letter-spacing:.05em; }
  .repo { padding:10px 14px; cursor:pointer; border-left:3px solid transparent; }
  .repo:hover { background:var(--panel2); }
  .repo.active { background:var(--panel2); border-left-color:var(--accent); }
  .repo .name { font-weight:600; }
  .repo .meta { color:var(--muted); font-size:12px; }
  .repo .toks { font-size:11px; margin-top:3px; }
  main { overflow:auto; padding:16px 20px; }
  .crumbs { color:var(--muted); margin-bottom:12px; }
  .crumbs a { color:var(--accent); cursor:pointer; text-decoration:none; }
  table { width:100%; border-collapse:collapse; }
  th,td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--border); font-variant-numeric:tabular-nums; }
  th { color:var(--muted); font-weight:500; font-size:12px; text-transform:uppercase; letter-spacing:.03em; }
  tbody tr { cursor:pointer; }
  tbody tr:hover { background:var(--panel2); }
  .mono { font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
  .num { text-align:right; }
  .pill { display:inline-block; padding:1px 7px; border-radius:10px; font-size:11px; background:var(--panel2); border:1px solid var(--border); color:var(--muted); }
  /* timeline */
  .ev { border:1px solid var(--border); border-radius:8px; margin:8px 0; background:var(--panel); }
  .ev .head { padding:8px 12px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; cursor:pointer; }
  .ev .role { font-weight:600; }
  .role-user { color:var(--accent); } .role-assistant { color:var(--in); }
  .ev .time { color:var(--muted); font-size:12px; }
  .ev .body { padding:0 12px 12px; display:none; }
  .ev.open .body { display:block; }
  .ev pre { white-space:pre-wrap; word-break:break-word; background:var(--bg); border:1px solid var(--border);
            border-radius:6px; padding:8px 10px; margin:6px 0; max-height:340px; overflow:auto; font-size:12.5px; }
  .lbl { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.04em; margin-top:8px; }
  .think { border-left:3px solid var(--cache); }
  .toks-mini { font-size:11px; color:var(--muted); }
  .empty { color:var(--muted); padding:40px; text-align:center; }
  button.tab { background:var(--panel2); color:var(--fg); border:1px solid var(--border); border-radius:6px;
               padding:5px 10px; cursor:pointer; margin-right:6px; }
  button.tab.active { border-color:var(--accent); color:var(--accent); }
  .bars { display:flex; align-items:flex-end; gap:6px; height:90px; padding:8px 2px; }
  .bar { display:flex; flex-direction:column; align-items:center; justify-content:flex-end; }
  .barfill { width:22px; background:linear-gradient(var(--accent),#1f6feb); border-radius:3px 3px 0 0; }
  .barlbl { font-size:10px; color:var(--muted); margin-top:4px; }
  .toolbar { display:flex; gap:14px; align-items:center; padding:8px 18px; border-bottom:1px solid var(--border); background:var(--panel); position:sticky; top:58px; z-index:4; }
  .ranges button { background:var(--panel2); color:var(--muted); border:1px solid var(--border); border-radius:6px; padding:5px 11px; cursor:pointer; margin-right:4px; }
  .ranges button.active { border-color:var(--accent); color:var(--accent); }
  #search { flex:1; max-width:520px; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:7px 12px; color:var(--fg); }
  .finding { padding:7px 10px; border-radius:6px; margin:5px 0; border-left:3px solid var(--border); background:var(--panel); }
  .sev-high { border-left-color:#f85149; } .sev-med { border-left-color:var(--out); } .sev-low { border-left-color:var(--muted); }
  .taginput { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:5px 9px; color:var(--fg); margin-right:6px; }
  .heat { display:inline-block; margin-top:6px; }
  .heatrow { display:flex; align-items:center; }
  .heatlbl { width:30px; font-size:11px; color:var(--muted); }
  .heath { width:16px; font-size:9px; color:var(--muted); text-align:left; }
  .heatcell { width:16px; height:16px; margin:1px; border-radius:2px; background:var(--panel2); }
</style>
</head>
<body>
<header>
  <h1>AgentLens <small>· Claude Code sessions</small></h1>
  <div class="totals" id="totals"></div>
</header>
<div class="toolbar">
  <div class="ranges" id="ranges">
    <button data-r="today" onclick="setRange('today',this)">Hôm nay</button>
    <button data-r="7d" onclick="setRange('7d',this)">7 ngày</button>
    <button data-r="30d" onclick="setRange('30d',this)">30 ngày</button>
    <button data-r="90d" onclick="setRange('90d',this)">90 ngày</button>
    <button data-r="all" class="active" onclick="setRange('all',this)">Tất cả</button>
  </div>
  <input id="search" placeholder="🔍 Tìm trong prompt / thinking / tool… (Enter)" onkeydown="if(event.key==='Enter')doSearch()" />
  <button class="tab" onclick="openInsights()">💡 Insight (LLM)</button>
</div>
<div class="layout">
  <aside>
    <h2>Repos</h2>
    <div id="repos"></div>
  </aside>
  <main id="main"><div class="empty">Đang tải…</div></main>
</div>

<script>
const fmt = n => (n ?? 0).toLocaleString('en-US');
const money = n => '$'+(n ?? 0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const ms = n => n>=1000 ? (n/1000).toFixed(1)+'s' : (n||0)+'ms';
const cacheHit = o => { const d=(o.input_tokens||0)+(o.cache_read_tokens||0)+(o.cache_creation_tokens||0); return d? Math.round((o.cache_read_tokens||0)/d*100):0; };
const shortId = s => (s||'').slice(0,8);
const tstr = s => s ? new Date(s).toLocaleString() : '—';
const esc = s => (s??'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
let activeRepo = null, activeSession = null, range = 'all';
const rq = () => 'range='+range;
function setRange(r, btn){
  range = r;
  document.querySelectorAll('#ranges button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadTotals(); selectRepo(activeRepo);
}

async function j(url){ const r = await fetch(url); if(!r.ok) throw new Error(await r.text()); return r.json(); }

function tokBadges(o){
  return `<span class="tin">↓in ${fmt(o.input_tokens)}</span> ·
          <span class="tout">↑out ${fmt(o.output_tokens)}</span> ·
          <span class="tcache">cached ${fmt(o.cache_read_tokens)}</span> ·
          <span style="color:#3fb950">${money(o.cost_usd)}</span>`;
}

async function loadTotals(){
  const t = await j('/api/totals?'+rq());
  document.getElementById('totals').innerHTML = `
    <div class="stat"><div class="k">Sessions</div><div class="v">${fmt(t.sessions)}</div></div>
    <div class="stat"><div class="k">Token in</div><div class="v tin">${fmt(t.input_tokens)}</div></div>
    <div class="stat"><div class="k">Token out</div><div class="v tout">${fmt(t.output_tokens)}</div></div>
    <div class="stat"><div class="k">Cached (read)</div><div class="v tcache">${fmt(t.cache_read_tokens)}</div></div>
    <div class="stat" title="cache_read / tổng input — càng cao càng tiết kiệm"><div class="k">Cache hit</div><div class="v tcache">${cacheHit(t)}%</div></div>
    <div class="stat" title="ước tính theo bảng giá model"><div class="k">Cost (ước tính)</div><div class="v" style="color:#3fb950">${money(t.cost_usd)}</div></div>`;
}

async function loadRepos(){
  const ps = await j('/api/projects?'+rq());
  const el = document.getElementById('repos');
  let html = `<div class="repo ${activeRepo===null?'active':''}" onclick="selectRepo(null)">
      <div class="name">Tất cả repo</div><div class="meta">${ps.length} repo</div></div>`;
  for(const p of ps){
    const name = p.project || '(không rõ)';
    html += `<div class="repo ${activeRepo===p.project?'active':''}" onclick="selectRepo(${JSON.stringify(p.project)})">
      <div class="name">${esc(name)}</div>
      <div class="meta">${fmt(p.sessions)} session · ${tstr(p.last_activity)}</div>
      <div class="toks">${tokBadges(p)}</div></div>`;
  }
  el.innerHTML = html;
}

async function selectRepo(project){
  activeRepo = project; activeSession = null;
  await loadRepos();
  const q = '?'+rq()+(project ? ('&project='+encodeURIComponent(project)) : '');
  const rows = await j('/api/sessions'+q);
  const title = project===null ? 'Tất cả repo' : esc(project||'(không rõ)');
  let html = `<div class="crumbs"><a onclick="selectRepo(null)">Repos</a> / <b>${title}</b></div>`;
  if(!rows.length){ html += `<div class="empty">Chưa có session nào.</div>`; document.getElementById('main').innerHTML=html; return; }
  html += `<table><thead><tr>
      <th>Session</th><th>Repo</th><th>Branch</th><th>Hoạt động cuối</th>
      <th class="num">in</th><th class="num">out</th><th class="num">cached</th><th class="num">cost</th><th class="num">events</th>
    </tr></thead><tbody>`;
  for(const s of rows){
    const live = s.last_activity && (Date.now() - new Date(s.last_activity).getTime() < 5*60000);
    const dot = live ? '<span title="đang hoạt động" style="color:#3fb950">● </span>' : '';
    const tagp = s.tag ? ` <span class="pill">${esc(s.tag)}</span>` : '';
    html += `<tr onclick='openSession(${JSON.stringify(s.session_id)})'>
      <td class="mono">${dot}${shortId(s.session_id)}${tagp}</td>
      <td>${esc(s.project||'')}</td>
      <td><span class="pill">${esc(s.git_branch||'—')}</span></td>
      <td>${tstr(s.last_activity)}</td>
      <td class="num tin">${fmt(s.input_tokens)}</td>
      <td class="num tout">${fmt(s.output_tokens)}</td>
      <td class="num tcache">${fmt(s.cache_read_tokens)}</td>
      <td class="num" style="color:#3fb950">${money(s.cost_usd)}</td>
      <td class="num">${fmt(s.events)}</td></tr>`;
  }
  html += `</tbody></table><div id="trends"></div><div id="outcomePanel"></div><div id="heatmapPanel"></div>
    <div id="toolsPanel"></div><div id="filesPanel"></div><div id="slowPanel"></div>`;
  document.getElementById('main').innerHTML = html;
  loadTrends(); loadOutcomes(project); loadHeatmap(project);
  loadTools(project); loadFiles(project); loadSlowest(project);
}

async function loadOutcomes(project){
  const q = '?'+rq()+(project ? ('&project='+encodeURIComponent(project)) : '');
  const rows = await j('/api/outcomes'+q).catch(()=>[]);
  const tagged = rows.filter(r=>r.outcome!=='(chưa tag)' && r.sessions>0);
  if(!tagged.length){ document.getElementById('outcomePanel').innerHTML=''; return; }
  let html = `<div class="lbl" style="margin-top:20px">Outcome correlation — tag → kết quả</div>
    <table><thead><tr><th>Outcome</th><th class="num">sessions</th><th class="num">cost TB</th>
      <th class="num">token TB</th><th class="num">tool error</th></tr></thead><tbody>`;
  for(const r of rows){
    html += `<tr style="cursor:default"><td><span class="pill">${esc(r.outcome)}</span></td>
      <td class="num">${fmt(r.sessions)}</td><td class="num" style="color:#3fb950">${money(r.avg_cost)}</td>
      <td class="num">${fmt(r.avg_tokens)}</td><td class="num">${(r.error_rate*100).toFixed(0)}%</td></tr>`;
  }
  document.getElementById('outcomePanel').innerHTML = html + `</tbody></table>`;
}

async function loadHeatmap(project){
  const q = '?'+rq()+(project ? ('&project='+encodeURIComponent(project)) : '');
  const rows = await j('/api/heatmap'+q).catch(()=>[]);
  if(!rows.length){ document.getElementById('heatmapPanel').innerHTML=''; return; }
  const days=['CN','T2','T3','T4','T5','T6','T7'];
  const max = Math.max(...rows.map(r=>r.count),1);
  const grid={}; rows.forEach(r=>grid[r.dow+'-'+r.hour]=r.count);
  let html = `<div class="lbl" style="margin-top:20px">Heatmap hoạt động (giờ UTC × thứ)</div><div class="heat">`;
  html += `<div class="heatrow"><div class="heatlbl"></div>`;
  for(let h=0;h<24;h++) html += `<div class="heath">${h%3===0?h:''}</div>`;
  html += `</div>`;
  for(let d=0;d<7;d++){
    html += `<div class="heatrow"><div class="heatlbl">${days[d]}</div>`;
    for(let h=0;h<24;h++){ const c=grid[d+'-'+h]||0; const op=c?(0.15+0.85*c/max):0;
      html += `<div class="heatcell" title="${days[d]} ${h}h: ${c}" style="background:rgba(88,166,255,${op})"></div>`; }
    html += `</div>`;
  }
  document.getElementById('heatmapPanel').innerHTML = html + `</div>`;
}

async function loadFiles(project){
  const q = '?'+rq()+(project ? ('&project='+encodeURIComponent(project)) : '');
  const rows = await j('/api/files'+q).catch(()=>[]);
  if(!rows.length){ document.getElementById('filesPanel').innerHTML=''; return; }
  let html = `<div class="lbl" style="margin-top:20px">Hot files — agent động nhiều nhất</div>
    <table><thead><tr><th>File</th><th class="num">edits</th><th class="num">reads</th><th class="num">tổng</th></tr></thead><tbody>`;
  for(const f of rows){
    html += `<tr style="cursor:default"><td class="mono">${esc(f.target)}</td>
      <td class="num tout">${fmt(f.edits)}</td><td class="num">${fmt(f.reads)}</td><td class="num">${fmt(f.total)}</td></tr>`;
  }
  document.getElementById('filesPanel').innerHTML = html + `</tbody></table>`;
}

async function loadSlowest(project){
  const q = '?'+rq()+(project ? ('&project='+encodeURIComponent(project)) : '');
  const rows = await j('/api/slowest'+q).catch(()=>[]);
  if(!rows.length){ document.getElementById('slowPanel').innerHTML=''; return; }
  let html = `<div class="lbl" style="margin-top:20px">Thao tác chậm nhất</div>
    <table><thead><tr><th>Tool</th><th>Target</th><th class="num">thời lượng</th></tr></thead><tbody>`;
  for(const t of rows){
    html += `<tr style="cursor:pointer" onclick='openSession(${JSON.stringify(t.session_id)})'>
      <td><span class="pill">🔧 ${esc(t.tool)}</span>${t.is_error?' <span class="pill" style="color:#f85149;border-color:#f85149">err</span>':''}</td>
      <td class="mono">${esc((t.target||'').slice(0,60))}</td>
      <td class="num">${ms(t.duration_ms||0)}</td></tr>`;
  }
  document.getElementById('slowPanel').innerHTML = html + `</tbody></table>`;
}

async function loadTrends(){
  try {
    const d = await j('/api/summary?group_by=day&'+rq());
    if(d.length<2){ document.getElementById('trends').innerHTML=''; return; }
    const max = Math.max(...d.map(x=>x.input_tokens+x.output_tokens),1);
    let bars = d.map(x=>{
      const h = Math.round((x.input_tokens+x.output_tokens)/max*60)+2;
      return `<div class="bar" title="${x.label}: in ${fmt(x.input_tokens)} / out ${fmt(x.output_tokens)} · ${money(x.cost_usd)}">
                <div class="barfill" style="height:${h}px"></div><div class="barlbl">${(x.label||'').slice(5)}</div></div>`;
    }).join('');
    document.getElementById('trends').innerHTML =
      `<div class="lbl" style="margin-top:18px">Trends — token (in+out) theo ngày</div><div class="bars">${bars}</div>`;
  } catch(e){}
}

async function loadTools(project){
  const q = '?'+rq()+(project ? ('&project='+encodeURIComponent(project)) : '');
  const rows = await j('/api/tools'+q);
  if(!rows.length){ document.getElementById('toolsPanel').innerHTML=''; return; }
  let html = `<div class="lbl" style="margin-top:20px">Tool & error analytics</div>
    <table><thead><tr><th>Tool</th><th class="num">Số lần</th><th class="num">Lỗi</th>
      <th class="num">Tỉ lệ lỗi</th><th class="num">TB</th><th class="num">Max</th></tr></thead><tbody>`;
  for(const t of rows){
    const bad = t.error_rate >= 0.1;
    html += `<tr style="cursor:default">
      <td><span class="pill">🔧 ${esc(t.tool)}</span></td>
      <td class="num">${fmt(t.count)}</td>
      <td class="num">${fmt(t.errors)}</td>
      <td class="num" style="color:${bad?'#f85149':'#8b949e'}">${(t.error_rate*100).toFixed(0)}%</td>
      <td class="num">${ms(t.avg_ms)}</td>
      <td class="num">${ms(t.max_ms)}</td></tr>`;
  }
  html += `</tbody></table>`;
  document.getElementById('toolsPanel').innerHTML = html;
}

async function openSession(id){
  activeSession = id;
  const enc = encodeURIComponent(id);
  const [evs, prompts, models, fric, errs, sess] = await Promise.all([
    j('/api/sessions/'+enc+'/events'),
    j('/api/sessions/'+enc+'/prompts').catch(()=>[]),
    j('/api/sessions/'+enc+'/models').catch(()=>[]),
    j('/api/sessions/'+enc+'/friction').catch(()=>[]),
    j('/api/sessions/'+enc+'/errors').catch(()=>[]),
    j('/api/sessions?range=all').catch(()=>[])
  ]);
  const meta = (sess||[]).find(s=>s.session_id===id) || {};
  const back = activeRepo===null ? 'selectRepo(null)' : `selectRepo(${JSON.stringify(activeRepo)})`;
  let html = `<div class="crumbs"><a onclick="${back}">← Sessions</a> / <b class="mono">${esc(id)}</b>
      <button class="tab" style="float:right" onclick='summarize(${JSON.stringify(id)},event)'>✨ Tóm tắt (LLM)</button></div>
      <div id="summaryBox"></div>`;
  // tag & outcome
  html += `<div style="margin:4px 0 10px">
      <input class="taginput" id="tagIn" placeholder="tag (vd: bugfix, feature)" value="${esc(meta.tag||'')}">
      <select class="taginput" id="outIn">
        <option value="">— outcome —</option>
        ${['success','partial','fail'].map(o=>`<option ${meta.outcome===o?'selected':''}>${o}</option>`).join('')}
      </select>
      <button class="tab" id="tagSave" onclick='saveTag(${JSON.stringify(id)})'>Lưu</button></div>`;
  // breakdown theo model (đổi model giữa session)
  if(models.length){
    html += `<div class="lbl">Theo model${models.length>1?' — session này dùng nhiều model':''}</div>
      <table><thead><tr><th>Model</th><th class="num">events</th><th class="num">in</th><th class="num">out</th><th class="num">cached</th><th class="num">cost</th></tr></thead><tbody>`;
    for(const m of models){
      html += `<tr style="cursor:default"><td><span class="pill">${esc(m.model)}</span></td>
        <td class="num">${fmt(m.events)}</td><td class="num tin">${fmt(m.input_tokens)}</td>
        <td class="num tout">${fmt(m.output_tokens)}</td><td class="num tcache">${fmt(m.cache_read_tokens)}</td>
        <td class="num" style="color:#3fb950">${money(m.cost_usd)}</td></tr>`;
    }
    html += `</tbody></table>`;
  }
  // friction / loop
  if(fric.length){
    html += `<div class="lbl" style="margin-top:14px">Friction / loop</div>`;
    for(const f of fric) html += `<div class="finding sev-${f.severity}">${esc(f.text)}</div>`;
  }
  // errors (debug nhanh)
  if(errs.length){
    html += `<div class="lbl" style="margin-top:14px">Lỗi (${errs.length})</div>`;
    for(const e of errs.slice(0,15)){
      html += `<div class="ev open think" style="border-left-color:#f85149"><div class="head"><span class="role" style="color:#f85149">⚠ error</span><span class="time">${tstr(e.ts)}</span></div><div class="body"><pre>${esc(e.snippet)}</pre></div></div>`;
    }
  }
  // breakdown theo prompt
  if(prompts.length){
    html += `<div class="lbl">Breakdown theo prompt (${prompts.length})</div>
      <table><thead><tr><th>Prompt</th><th class="num">turns</th><th class="num">tools</th>
        <th class="num">in</th><th class="num">out</th><th class="num">cached</th>
        <th class="num" title="số bước reasoning (thinking block); chữ trong ngoặc là độ dài nếu version Claude Code có lưu">reasoning</th><th class="num">cost</th></tr></thead><tbody>`;
    for(const p of prompts){
      const snip = (p.prompt||'').replace(/\s+/g,' ').slice(0,60);
      const tk = p.thinking_chars||0; const tks = tk>=1000 ? ' · '+(tk/1000).toFixed(1)+'k ký tự' : (tk>0?' · '+tk+' ký tự':'');
      html += `<tr style="cursor:default"><td>${esc(snip)||'<i>—</i>'}</td>
        <td class="num">${fmt(p.turns)}</td><td class="num">${fmt(p.tool_turns)}</td>
        <td class="num tin">${fmt(p.input_tokens)}</td><td class="num tout">${fmt(p.output_tokens)}</td>
        <td class="num tcache">${fmt(p.cache_read_tokens)}</td>
        <td class="num tcache" title="${fmt(p.thinking_blocks)} bước${tks}">${fmt(p.thinking_blocks)}</td>
        <td class="num" style="color:#3fb950">${money(p.cost_usd)}</td></tr>`;
    }
    html += `</tbody></table><div class="lbl" style="margin-top:18px">Timeline</div>`;
  }
  if(!evs.length){ html += `<div class="empty">Chưa có event (transcript có thể chưa được tail).</div>`; }
  for(const e of evs){
    const role = e.role || e.kind || '';
    const hasTok = e.input_tokens||e.output_tokens||e.cache_read_tokens;
    const tk = hasTok ? `<span class="toks-mini">· <span class="tin">in ${fmt(e.input_tokens)}</span>
       <span class="tout">out ${fmt(e.output_tokens)}</span>
       <span class="tcache">cached ${fmt(e.cache_read_tokens)}</span></span>` : '';
    const tool = e.tool_name ? `<span class="pill">🔧 ${esc(e.tool_name)}</span>` : '';
    const errp = e.tool_error ? `<span class="pill" style="color:#f85149;border-color:#f85149">⚠ error</span>` : '';
    let body = '';
    if(e.thinking) body += `<div class="lbl">thinking</div><pre class="think">${esc(e.thinking)}</pre>`;
    if(e.text) body += `<div class="lbl">text</div><pre>${esc(e.text)}</pre>`;
    if(e.tool_input) body += `<div class="lbl">tool input</div><pre>${esc(e.tool_input)}</pre>`;
    if(e.tool_result) body += `<div class="lbl">tool result</div><pre>${esc(e.tool_result)}</pre>`;
    if(!body) body = `<div class="toks-mini">(không có nội dung text)</div>`;
    html += `<div class="ev" onclick="this.classList.toggle('open')">
      <div class="head">
        <span class="role role-${role}">${esc(role)}</span>
        ${tool}${errp}
        <span class="time">${tstr(e.ts)}</span>
        ${e.model?`<span class="pill">${esc(e.model)}</span>`:''}
        ${tk}
      </div>
      <div class="body">${body}</div></div>`;
  }
  document.getElementById('main').innerHTML = html;
}

async function summarize(id, ev){
  if(ev) ev.stopPropagation();
  const box = document.getElementById('summaryBox');
  box.innerHTML = `<div class="ev open"><div class="body"><div class="toks-mini">Đang gọi LLM…</div></div></div>`;
  try {
    const r = await fetch('/api/sessions/'+encodeURIComponent(id)+'/summarize', {method:'POST'});
    const t = await r.text();
    if(!r.ok){ box.innerHTML = `<div class="ev open think"><div class="body"><div class="lbl">LLM</div><pre>${esc(t)}</pre></div></div>`; return; }
    const d = JSON.parse(t);
    box.innerHTML = `<div class="ev open think"><div class="head"><span class="role">✨ Tóm tắt & gợi ý</span></div>
       <div class="body"><pre>${esc(d.summary)}</pre></div></div>`;
  } catch(e){ box.innerHTML = `<div class="ev open"><div class="body"><pre>${esc(e.message)}</pre></div></div>`; }
}

async function doSearch(){
  const term = document.getElementById('search').value.trim();
  if(!term){ selectRepo(activeRepo); return; }
  activeSession = null;
  const q = '?q='+encodeURIComponent(term)+'&'+rq()+(activeRepo?('&project='+encodeURIComponent(activeRepo)):'');
  const rows = await j('/api/search'+q);
  let html = `<div class="crumbs">Tìm "<b>${esc(term)}</b>" — ${rows.length} kết quả</div>`;
  if(!rows.length) html += `<div class="empty">Không có kết quả.</div>`;
  for(const r of rows){
    html += `<div class="ev open" style="cursor:pointer" onclick='openSession(${JSON.stringify(r.session_id)})'>
      <div class="head"><span class="role role-${r.role||''}">${esc(r.role||'')}</span>
        ${r.tool_name?`<span class="pill">🔧 ${esc(r.tool_name)}</span>`:''}
        <span class="time">${tstr(r.ts)}</span><span class="pill">${esc(r.project||'')}</span>
        <span class="mono toks-mini">${shortId(r.session_id)}</span></div>
      <div class="body"><pre>${esc(r.snippet)}</pre></div></div>`;
  }
  document.getElementById('main').innerHTML = html;
}

async function openInsights(){
  activeSession = null;
  const list = await j('/api/insights').catch(()=>[]);
  const scope = activeRepo ? esc(activeRepo) : 'tất cả repo';
  let html = `<div class="crumbs">💡 Cross-session insight — phạm vi <b>${scope}</b>
     <button class="tab" style="float:right" onclick="runAnalyze()">⚙ Phân tích ngay (LLM)</button></div>
     <div id="analyzeBox"></div>`;
  if(list.length){
    html += `<div class="lbl">Insight đã lưu</div>`;
    for(const it of list){
      html += `<div class="ev open think"><div class="head"><span class="role">${esc(it.scope||'')}</span><span class="time">${tstr(it.created_at)}</span></div>
        <div class="body"><pre>${esc(it.content)}</pre></div></div>`;
    }
  } else html += `<div class="empty">Chưa có insight. Bấm "Phân tích ngay" (cần ANTHROPIC_API_KEY).</div>`;
  document.getElementById('main').innerHTML = html;
}
async function runAnalyze(){
  const box = document.getElementById('analyzeBox');
  box.innerHTML = `<div class="ev open"><div class="body"><div class="toks-mini">Đang phân tích bằng LLM…</div></div></div>`;
  const q = activeRepo ? ('?project='+encodeURIComponent(activeRepo)) : '';
  try {
    const r = await fetch('/api/insights/analyze'+q, {method:'POST'});
    const t = await r.text();
    if(!r.ok){ box.innerHTML = `<div class="ev open think"><div class="body"><pre>${esc(t)}</pre></div></div>`; return; }
    const d = JSON.parse(t);
    box.innerHTML = `<div class="ev open think"><div class="head"><span class="role">💡 ${esc(d.scope)}</span></div><div class="body"><pre>${esc(d.content)}</pre></div></div>`;
  } catch(e){ box.innerHTML = `<div class="ev open"><div class="body"><pre>${esc(e.message)}</pre></div></div>`; }
}
async function saveTag(id){
  const tag = document.getElementById('tagIn').value, outcome = document.getElementById('outIn').value;
  await fetch('/api/sessions/'+encodeURIComponent(id)+'/tag', {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({tag, outcome})});
  const btn = document.getElementById('tagSave'); if(btn){ btn.textContent='✓ Đã lưu'; setTimeout(()=>btn.textContent='Lưu',1500); }
}

let refreshTimer = null;
async function refreshCurrent(){
  // refresh nhẹ theo view đang xem (giữ nguyên session/repo đang mở)
  try {
    await loadTotals();
    if(activeSession){ /* không tự đóng/cuộn lại timeline đang đọc; chỉ cập nhật header */ }
    else { await selectRepo(activeRepo); }
  } catch(e){ console.error(e); }
}
function liveDebounced(){ clearTimeout(refreshTimer); refreshTimer = setTimeout(refreshCurrent, 600); }

function connectWS(){
  try {
    const ws = new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ws');
    ws.onmessage = () => liveDebounced();
    ws.onclose = () => setTimeout(connectWS, 3000); // tự kết nối lại
  } catch(e){ setTimeout(connectWS, 3000); }
}

(async function init(){
  try { await loadTotals(); await loadRepos(); await selectRepo(null); }
  catch(e){ document.getElementById('main').innerHTML = `<div class="empty">Lỗi: ${esc(e.message)}</div>`; }
  connectWS();                       // live update qua WebSocket
  setInterval(loadTotals, 8000);     // fallback poll tổng
})();
</script>
