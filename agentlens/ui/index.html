<!doctype html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AgentLens — Claude Code sessions</title>
<style>
  /* ui-ux-pro-max: PIXEL ART — Pixelify Sans + VT323, hard edges, hard shadows, limited palette */
  @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=VT323&display=swap');
  :root{
    /* dark — limited retro palette: ink on midnight, single amber accent */
    --bg:#12141d; --surface:#1b1e2c; --surface-2:#242838; --surface-3:#2e3349;
    --border:#454b68; --border-strong:#6b7398;
    --fg:#ece7d4; --fg-soft:#b4b09e; --muted:#838aa1;
    --accent:#ffb22e; --accent-2:#ffb22e; --accent-weak:rgba(255,178,46,.15);
    --green:#5bd16a; --amber:#ffb22e; --red:#ff5a5a;
    --in:#ece7d4; --out:#ece7d4; --cache:#ece7d4;
    --radius:0px; --radius-sm:0px; --radius-pill:0px;
    --shadow:4px 4px 0 0 #0a0b10; --shadow-sm:3px 3px 0 0 #0a0b10;
    --grad:var(--accent); --shadow-col:#0a0b10;
    --hdr-h:56px; --tb-h:52px; --kpi-h:98px; --maxw:1380px;
    --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px; --s7:48px;
  }
  [data-theme="light"]{
    /* light — retro cream paper, dark ink borders, dark-amber accent */
    --bg:#e9e4cf; --surface:#f4efdb; --surface-2:#e2dcc1; --surface-3:#d5ceaf;
    --border:#26241c; --border-strong:#000000;
    --fg:#26241c; --fg-soft:#4c4736; --muted:#6c6650;
    --accent:#b56b00; --accent-2:#b56b00; --accent-weak:rgba(181,107,0,.14);
    --green:#2e7d32; --amber:#9a6400; --red:#c62828;
    --in:#26241c; --out:#26241c; --cache:#26241c;
    --shadow:4px 4px 0 0 #26241c; --shadow-sm:3px 3px 0 0 #26241c;
    --grad:var(--accent); --shadow-col:#26241c;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{ margin:0; background:var(--bg); color:var(--fg);
    font:15px/1.5 "Pixelify Sans",ui-monospace,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    image-rendering:pixelated; }
  /* số liệu, code dùng VT323 (terminal) */
  .mono,pre,.val,td.num,.kcard .val,.barlbl,.heath,.heatlbl{ font-family:"VT323",ui-monospace,Menlo,Consolas,monospace; }
  ::-webkit-scrollbar{ width:11px; height:11px; }
  ::-webkit-scrollbar-thumb{ background:var(--border-strong); border-radius:8px; border:3px solid transparent; background-clip:padding-box; }
  ::-webkit-scrollbar-thumb:hover{ background:var(--muted); background-clip:padding-box; }
  a{ color:var(--accent); cursor:pointer; text-decoration:none; }

  /* ── header ── */
  header{ height:var(--hdr-h); padding:0 18px; background:var(--surface); border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:18px; position:sticky; top:0; z-index:6; }
  .brand{ display:flex; align-items:center; gap:11px; }
  .logo{ width:30px; height:30px; border-radius:9px; background:var(--grad); display:grid; place-items:center;
    color:#fff; box-shadow:var(--shadow-sm); }
  .brand h1{ font-size:15px; margin:0; font-weight:700; letter-spacing:-.01em; }
  .brand .sub{ display:block; font-size:11px; color:var(--muted); font-weight:500; margin-top:-1px; }
  /* KPI metrics band — dashboard "key indicators" row */
  .kpiband{ display:flex; gap:var(--s3); height:var(--kpi-h); align-items:stretch; overflow-x:auto;
    background:var(--bg); border-bottom:1px solid var(--border);
    padding:var(--s4) max(20px,calc((100% - var(--maxw))/2)); scrollbar-width:none; }
  .kpiband::-webkit-scrollbar{ display:none; }
  .kcard{ flex:1 1 0; min-width:138px; background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); padding:11px 15px; display:flex; flex-direction:column; gap:7px;
    box-shadow:var(--shadow-sm); transition:border-color .15s,transform .15s; }
  .kcard:hover{ border-color:var(--border-strong); transform:translateY(-1px); }
  .kcard .top{ display:flex; align-items:center; gap:6px; color:var(--muted); font-size:10.5px;
    font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
  .kcard .top svg{ opacity:.75; }
  .kcard .val{ font-size:27px; font-weight:400; letter-spacing:.01em; line-height:.95; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  /* màu giới hạn: dữ liệu = ink trung tính; chỉ tiền dùng accent */
  .tin,.tout,.tcache{ color:var(--fg); } .tcost{ color:var(--accent); }
  .icon-btn{ flex:none; width:34px; height:34px; display:grid; place-items:center; cursor:pointer;
    background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--fg-soft);
    transition:all .15s; }
  .icon-btn:hover{ color:var(--fg); border-color:var(--border-strong); background:var(--surface-3); }

  /* ── toolbar ── */
  .toolbar{ height:var(--tb-h); display:flex; gap:12px; align-items:center; padding:0 18px;
    background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:var(--hdr-h); z-index:5; }
  .seg{ display:flex; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-pill); padding:3px; }
  .seg button{ border:none; background:transparent; color:var(--muted); font:inherit; font-size:12.5px; font-weight:600;
    padding:5px 12px; border-radius:var(--radius-pill); cursor:pointer; transition:all .15s; white-space:nowrap; }
  .seg button:hover{ color:var(--fg); }
  .seg button.active{ background:var(--accent); color:#fff; box-shadow:var(--shadow-sm); }
  [data-theme="light"] .seg button.active{ color:#fff; }
  .searchwrap{ flex:1; max-width:560px; position:relative; display:flex; align-items:center; }
  .searchwrap svg{ position:absolute; left:12px; color:var(--muted); pointer-events:none; }
  #search{ width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-pill);
    padding:8px 14px 8px 36px; color:var(--fg); font:inherit; transition:all .15s; }
  #search:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-weak); }
  #search::placeholder{ color:var(--muted); }
  .btn{ display:inline-flex; align-items:center; gap:6px; background:var(--surface-2); color:var(--fg);
    border:1px solid var(--border); border-radius:var(--radius-sm); padding:7px 13px; cursor:pointer; font:inherit;
    font-weight:600; font-size:13px; transition:all .15s; white-space:nowrap; }
  .btn:hover{ border-color:var(--border-strong); background:var(--surface-3); }
  .btn.primary{ background:var(--accent); border-color:transparent; color:#fff; }
  .btn.primary:hover{ filter:brightness(1.08); }
  .btn.active{ border-color:var(--accent); color:var(--accent); background:var(--accent-weak); }

  /* ── layout ── */
  .layout{ display:grid; grid-template-columns:276px 1fr; height:calc(100vh - var(--hdr-h) - var(--tb-h) - var(--kpi-h)); }
  aside{ border-right:1px solid var(--border); background:var(--surface); overflow:auto; padding:8px; }
  aside h2{ font-size:11px; text-transform:uppercase; color:var(--muted); padding:8px 10px 6px; margin:0; letter-spacing:.06em; font-weight:700; }
  .repo{ padding:10px 12px; cursor:pointer; border-radius:var(--radius-sm); transition:background .15s; position:relative; margin-bottom:2px; }
  .repo:hover{ background:var(--surface-2); }
  .repo.active{ background:var(--accent-weak); }
  .repo.active::before{ content:""; position:absolute; left:0; top:8px; bottom:8px; width:3px; border-radius:3px; background:var(--accent); }
  .repo .name{ font-weight:650; }
  .repo .meta{ color:var(--muted); font-size:12px; margin-top:1px; }
  .repo .toks{ font-size:11px; margin-top:4px; color:var(--fg-soft); }
  main{ overflow:auto; padding:24px max(20px,calc((100% - var(--maxw))/2)) 64px; }

  .crumbs{ color:var(--muted); margin-bottom:14px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .crumbs b{ color:var(--fg); }

  /* ── tabs ── */
  .tabs{ display:flex; gap:4px; margin:2px 0 18px; border-bottom:1px solid var(--border); }
  .tab{ display:inline-flex; align-items:center; gap:7px; background:transparent; color:var(--muted); border:none;
    border-bottom:2px solid transparent; padding:9px 13px; cursor:pointer; font:inherit; font-weight:600; font-size:13.5px;
    margin-bottom:-1px; transition:color .15s,border-color .15s; }
  .tab:hover{ color:var(--fg); }
  .tab.active{ color:var(--accent); border-bottom-color:var(--accent); }
  .tab svg{ opacity:.85; }

  /* ── tables ── */
  table{ width:100%; border-collapse:separate; border-spacing:0; background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow-sm); margin:6px 0 4px; }
  th,td{ text-align:left; padding:10px 14px; border-bottom:1px solid var(--border); font-variant-numeric:tabular-nums; }
  thead th{ position:sticky; top:0; background:var(--surface-2); color:var(--muted); font-weight:600; font-size:11px;
    text-transform:uppercase; letter-spacing:.04em; z-index:1; }
  tbody tr{ cursor:pointer; transition:background .12s; }
  tbody tr:last-child td{ border-bottom:none; }
  tbody tr:hover{ background:var(--accent-weak); }
  .num{ text-align:right; }
  .mono{ font-family:"VT323",ui-monospace,Menlo,Consolas,monospace; font-size:16px; letter-spacing:.02em; }
  td.num{ font-size:16px; }

  .pill{ display:inline-flex; align-items:center; gap:4px; padding:2px 9px; border-radius:var(--radius-pill); font-size:11px;
    font-weight:600; background:var(--surface-2); border:1px solid var(--border); color:var(--fg-soft); }
  .pill.err{ color:var(--red); border-color:color-mix(in srgb,var(--red) 35%,transparent); background:color-mix(in srgb,var(--red) 12%,transparent); }
  .hbadge{ display:inline-block; min-width:34px; text-align:center; padding:2px 8px; border-radius:var(--radius-pill);
    font-weight:700; font-size:12px; color:var(--c); background:color-mix(in srgb,var(--c) 15%,transparent);
    border:1px solid color-mix(in srgb,var(--c) 30%,transparent); }
  .dot{ width:8px; height:8px; border-radius:50%; display:inline-block; }
  .dot.live{ background:var(--green); box-shadow:0 0 0 0 color-mix(in srgb,var(--green) 70%,transparent); animation:pulse 1.8s infinite; }
  @keyframes pulse{ 0%{ box-shadow:0 0 0 0 color-mix(in srgb,var(--green) 60%,transparent);} 70%{ box-shadow:0 0 0 7px transparent;} 100%{ box-shadow:0 0 0 0 transparent;} }

  /* ── section labels ── */
  .lbl{ color:var(--fg); font-size:14px; font-weight:700; letter-spacing:-.01em; margin:var(--s6) 0 var(--s3);
    display:flex; align-items:center; gap:9px; flex-wrap:wrap; padding-left:11px; position:relative; }
  .lbl::before{ content:""; position:absolute; left:0; top:1px; bottom:1px; width:3px; border-radius:3px; background:var(--accent); }
  .lbl:first-child{ margin-top:var(--s2); }
  .lbl .note{ font-weight:500; color:var(--muted); font-size:11.5px; letter-spacing:0; }
  .toks-mini{ font-size:11px; color:var(--muted); }

  /* ── findings / cards ── */
  .finding{ padding:10px 13px; border-radius:var(--radius-sm); margin:6px 0; background:var(--surface);
    border:1px solid var(--border); border-left:3px solid var(--border-strong); box-shadow:var(--shadow-sm); }
  .finding.sev-high{ border-left-color:var(--red); } .finding.sev-med{ border-left-color:var(--amber); } .finding.sev-low{ border-left-color:var(--muted); }

  /* ── KPI grid for digest ── */
  .kpis{ display:flex; gap:12px; flex-wrap:wrap; margin:8px 0 6px; }
  .kpi{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px;
    min-width:130px; box-shadow:var(--shadow-sm); }
  .kpi .k{ color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.04em; font-weight:600; }
  .kpi .v{ font-size:21px; font-weight:750; letter-spacing:-.02em; margin-top:3px; }

  /* ── bars ── */
  .bars{ display:flex; align-items:flex-end; gap:6px; height:120px; padding:14px 12px; background:var(--surface);
    border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow-sm);
    background-image:repeating-linear-gradient(to top,transparent 0,transparent calc(25% - 1px),var(--border) calc(25% - 1px),var(--border) 25%);
    background-position:0 -14px; }
  .bar{ display:flex; flex-direction:column; align-items:center; justify-content:flex-end; flex:1; min-width:14px; }
  .barfill{ width:60%; max-width:26px; min-width:8px; background:var(--grad); border-radius:5px 5px 0 0; transition:height .25s; }
  .barlbl{ font-size:10px; color:var(--muted); margin-top:5px; }

  /* ── timeline events ── */
  .ev{ border:1px solid var(--border); border-radius:var(--radius-sm); margin:8px 0; background:var(--surface); box-shadow:var(--shadow-sm); overflow:hidden; }
  .ev .head{ padding:10px 13px; display:flex; gap:9px; align-items:center; flex-wrap:wrap; cursor:pointer; }
  .ev .head:hover{ background:var(--surface-2); }
  .ev .role{ font-weight:700; }
  .role-user{ color:var(--accent); } .role-assistant{ color:var(--green); }
  .ev .time{ color:var(--muted); font-size:12px; }
  .ev .body{ padding:0 13px 12px; display:none; }
  .ev.open .body{ display:block; }
  .ev.open .head{ border-bottom:1px solid var(--border); margin-bottom:8px; }
  pre{ white-space:pre-wrap; word-break:break-word; background:var(--bg); border:2px solid var(--border); border-radius:var(--radius-sm);
    padding:10px 12px; margin:6px 0; max-height:360px; overflow:auto; font-size:15px;
    font-family:"VT323",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
  .think{ border-left:3px solid var(--accent-2); }

  /* ── inputs ── */
  .taginput{ background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:7px 11px; color:var(--fg); font:inherit; margin-right:7px; }
  .taginput:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-weak); }

  /* ── heatmap ── */
  .heat{ display:inline-block; margin-top:6px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px; box-shadow:var(--shadow-sm); }
  .heatrow{ display:flex; align-items:center; }
  .heatlbl{ width:32px; font-size:11px; color:var(--muted); }
  .heath{ width:17px; font-size:9px; color:var(--muted); text-align:left; }
  .heatcell{ width:17px; height:17px; margin:1.5px; border-radius:3px; background:var(--surface-3); }

  /* ── empty ── */
  .empty{ color:var(--muted); padding:54px 20px; text-align:center; }
  .empty svg{ opacity:.4; margin-bottom:10px; }

  /* ── live cards ── */
  #liveCards{ display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:12px; margin-top:8px; }
  .livecard{ border:1px solid var(--border); border-radius:var(--radius); padding:13px 15px; background:var(--surface);
    cursor:pointer; box-shadow:var(--shadow-sm); transition:border-color .15s,transform .15s,box-shadow .15s; }
  .livecard:hover{ border-color:var(--accent); transform:translateY(-2px); box-shadow:var(--shadow); }
  .livecard .lc-top{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .livecard .lc-act{ margin:9px 0 6px; font-size:13px; }
  .livecard .lc-meta{ font-size:11.5px; color:var(--muted); }

  /* ── modal / replay ── */
  .overlay{ position:fixed; inset:0; background:rgba(2,4,10,.62); backdrop-filter:blur(3px); display:flex;
    align-items:center; justify-content:center; z-index:30; }
  .replay{ width:min(860px,93vw); max-height:88vh; background:var(--surface); border:1px solid var(--border-strong);
    border-radius:var(--radius); display:flex; flex-direction:column; box-shadow:var(--shadow); overflow:hidden; }
  .replay .rhead{ display:flex; gap:9px; align-items:center; padding:13px 16px; border-bottom:1px solid var(--border); background:var(--surface-2); }
  .replay .rbody{ padding:14px 18px; overflow:auto; }
  .replay .rbody .head{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
  svg{ flex:none; }

  /* ── pixel art treatment ── */
  .brand h1{ font-weight:700; letter-spacing:.03em; }
  .logo{ border:2px solid var(--shadow-col); }
  .kcard,.ev,table,.finding,.livecard,.bars,.heat,.replay,.kpi,aside,#search,.taginput,.seg{ border-width:2px; }
  .kcard,.livecard,.finding,.bars,.heat,.kpi{ box-shadow:var(--shadow); }
  .btn,.icon-btn{ border-width:2px; box-shadow:var(--shadow-sm); }
  .btn:active,.icon-btn:active,.seg button:active,.tab:active{ transform:translate(3px,3px); box-shadow:none; }
  .seg{ padding:0; }
  .seg button.active{ box-shadow:none; }
  .tab{ border:2px solid transparent; border-bottom:none; padding:8px 13px; }
  .tab.active{ background:var(--accent); color:#15151f; }
  [data-theme="light"] .tab.active{ color:var(--surface); }
  th{ font-family:"Pixelify Sans",monospace; font-weight:700; }
  .pill{ border-width:2px; }
  .hbadge{ border-width:2px; font-family:"VT323",monospace; font-size:15px; }
  .repo.active{ border:2px solid var(--accent); }
  .repo.active::before{ display:none; }
  /* subtle CRT scanlines */
  body::after{ content:""; position:fixed; inset:0; pointer-events:none; z-index:60;
    background:repeating-linear-gradient(to bottom,transparent 0 2px,rgba(0,0,0,.05) 2px 3px); }
  [data-theme="light"] body::after{ background:repeating-linear-gradient(to bottom,transparent 0 2px,rgba(0,0,0,.025) 2px 3px); }

  /* ── a11y (ui-ux-pro-max checklist) ── */
  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; border-radius:4px; }
  button,.tab,.repo,.livecard,tbody tr,.seg button{ outline-offset:2px; }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
  }
  /* ── responsive ── */
  @media (max-width:1024px){
    .layout{ grid-template-columns:230px 1fr; }
    .brand .sub{ display:none; }
  }
  @media (max-width:760px){
    .layout{ grid-template-columns:1fr; }
    aside{ display:none; }
    .toolbar{ flex-wrap:wrap; height:auto; padding:10px 14px; }
    .searchwrap{ max-width:none; order:3; flex-basis:100%; }
    header{ padding:0 12px; }
    main{ padding:14px; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="logo"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></span>
    <div><h1>AgentLens</h1><span class="sub">Claude Code sessions</span></div>
  </div>
  <div style="margin-left:auto"></div>
  <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Đổi sáng/tối" aria-label="Đổi sáng/tối"></button>
</header>
<div class="toolbar">
  <div class="seg" id="ranges">
    <button data-r="today" onclick="setRange('today',this)">Hôm nay</button>
    <button data-r="7d" onclick="setRange('7d',this)">7 ngày</button>
    <button data-r="30d" onclick="setRange('30d',this)">30 ngày</button>
    <button data-r="90d" onclick="setRange('90d',this)">90 ngày</button>
    <button data-r="all" class="active" onclick="setRange('all',this)">Tất cả</button>
  </div>
  <div class="searchwrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="search" placeholder="Tìm trong prompt / thinking / tool…  (Enter)" onkeydown="if(event.key==='Enter')doSearch()" />
  </div>
  <button class="btn" onclick="openInsights()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1V18h6v-1.2c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2z"/></svg>
    Insight
  </button>
</div>
<div class="kpiband" id="totals"></div>
<div class="layout">
  <aside>
    <h2>Repos</h2>
    <div id="repos"></div>
  </aside>
  <main id="main"><div class="empty">Đang tải…</div></main>
</div>

<script>
const fmt = n => (n ?? 0).toLocaleString('en-US');
const kfmt = n => { n = n||0; if(n>=1e9) return (n/1e9).toFixed(1)+'B'; if(n>=1e6) return (n/1e6).toFixed(1)+'M'; if(n>=1e3) return (n/1e3).toFixed(1)+'K'; return ''+n; };
const money = n => '$'+(n ?? 0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const ms = n => n>=1000 ? (n/1000).toFixed(1)+'s' : (n||0)+'ms';
const cacheHit = o => { const d=(o.input_tokens||0)+(o.cache_read_tokens||0)+(o.cache_creation_tokens||0); return d? Math.round((o.cache_read_tokens||0)/d*100):0; };
const shortId = s => (s||'').slice(0,8);

// ── theme ──
function applyTheme(t){
  document.documentElement.setAttribute('data-theme', t);
  try{ localStorage.setItem('al-theme', t); }catch(e){}
  const b = document.getElementById('themeBtn');
  if(b) b.innerHTML = ic(t==='dark'?'sun':'moon',17);
}
function toggleTheme(){ applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'); }
function healthBadge(h){ if(h==null) return '—'; const c=h>=80?'var(--green)':(h>=50?'var(--amber)':'var(--red)'); return `<span class="hbadge" style="--c:${c}">${h}</span>`; }

function setRange(r, btn){
  range = r;
  document.querySelectorAll('#ranges button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadTotals(); selectRepo(activeRepo);
}

async function j(url){ const r = await fetch(url); if(!r.ok) throw new Error(await r.text()); return r.json(); }

function tokBadges(o){
  return `<span class="tin">↓in ${fmt(o.input_tokens)}</span> ·
          <span class="tout">↑out ${fmt(o.output_tokens)}</span> ·
          <span class="tcache">cached ${fmt(o.cache_read_tokens)}</span> ·
          <span class="tcost">${money(o.cost_usd)}</span>`;
}

async function loadTotals(){
  const t = await j('/api/totals?'+rq());
  const card = (icon,label,val,cls,title)=>`<div class="kcard"${title?` title="${title}"`:''}>
    <div class="top">${ic(icon,13)}${label}</div><div class="val ${cls||''}">${val}</div></div>`;
  let h = '';
  h += card('sessions','Sessions',fmt(t.sessions));
  h += card('arrowDown','Token in',kfmt(t.input_tokens),'tin',fmt(t.input_tokens)+' token in');
  h += card('arrowUp','Token out',kfmt(t.output_tokens),'tout',fmt(t.output_tokens)+' token out');
  h += card('database','Cached',kfmt(t.cache_read_tokens),'tcache',fmt(t.cache_read_tokens)+' cached');
  h += card('percent','Cache hit',cacheHit(t)+'%','tcache','cache_read / tổng input — càng cao càng tiết kiệm');
  h += card('dollar','Cost',money(t.cost_usd),'tcost','ước tính theo bảng giá model');
  h += card('tag','Tiết kiệm',money(t.cache_savings_usd),'tcache','tiền tiết kiệm nhờ prompt cache');
  if(t.loc_added||t.loc_removed)
    h += card('code','LOC',`<span class="tin">+${fmt(t.loc_added)}</span><span style="color:var(--muted)">/</span><span style="color:var(--red)">-${fmt(t.loc_removed)}</span>`,'','từ OTEL');
  document.getElementById('totals').innerHTML = h;
}

async function loadRepos(){
  const ps = await j('/api/projects?'+rq());
  const el = document.getElementById('repos');
  let html = `<div class="repo ${activeRepo===null?'active':''}" onclick="selectRepo(null)">
      <div class="name">Tất cả repo</div><div class="meta">${ps.length} repo</div></div>`;
  for(const p of ps){
    const name = p.project || '(không rõ)';
    html += `<div class="repo ${activeRepo===p.project?'active':''}" onclick="selectRepo(${JSON.stringify(p.project)})">
      <div class="name">${esc(name)}</div>
      <div class="meta">${fmt(p.sessions)} session · ${tstr(p.last_activity)}</div>
      <div class="toks">${tokBadges(p)}</div></div>`;
  }
  el.innerHTML = html;
}

const TABS = [['live','Live'],['sessions','Sessions'],['tools','Tools'],['files','Files'],['analytics','Phân tích'],['quality','Chất lượng']];

async function selectRepo(project){
  activeRepo = project; activeSession = null;
  await loadRepos();
  const title = project===null ? 'Tất cả repo' : esc(project||'(không rõ)');
  let html = `<div class="crumbs"><a onclick="selectRepo(null)">Repos</a> <span style="color:var(--muted)">/</span> <b>${title}</b></div>`;
  html += `<div class="tabs">` + TABS.map(([k,l]) =>
    `<button class="tab ${activeTab===k?'active':''}" data-t="${k}" onclick="setTab('${k}')">${ic(TABICON[k])}${l}</button>`).join('') + `</div>`;
  html += `<div id="tabContent"></div>`;
  document.getElementById('main').innerHTML = html;
  loadTab(project);
}

function setTab(t){
  activeTab = t;
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active', b.dataset.t===t));
  loadTab(activeRepo);
}

function loadTab(project){
  const c = document.getElementById('tabContent');
  if(!c) return;
  if(activeTab==='live'){ loadLive(project, c); }
  else if(activeTab==='sessions'){ loadSessionsTab(project, c); }
  else if(activeTab==='tools'){
    c.innerHTML = `<div id="toolsPanel"></div><div id="seqPanel"></div><div id="slowPanel"></div>`;
    loadTools(project); loadSequences(project); loadSlowest(project);
  } else if(activeTab==='files'){
    c.innerHTML = `<div id="filesPanel"></div>`; loadFiles(project);
  } else if(activeTab==='analytics'){
    c.innerHTML = `<div id="trends"></div><div id="healthTrend"></div><div id="leaderboard"></div><div id="outcomePanel"></div><div id="heatmapPanel"></div>`;
    loadTrends(); loadHealthTrend(project); loadLeaderboard(); loadOutcomes(project); loadHeatmap(project);
  } else if(activeTab==='quality'){
    c.innerHTML = `<div id="digestPanel"></div><div id="rightsizePanel"></div><div id="promptPanel"></div>`
      + `<div id="stylePanel"></div><div id="recoveryPanel"></div><div id="cacheAdvPanel"></div>`
      + `<div id="agentsPanel"></div><div id="errClusterPanel"></div>`;
    loadDigest(project); loadRightsizing(project); loadPromptInsights(project);
    loadPromptStyles(project); loadRecovery(project); loadCacheAdvisor(project);
    loadAgents(project); loadErrorClusters(project);
  }
}

async function loadDigest(project){
  const q = project ? ('?project='+encodeURIComponent(project)) : '';
  const d = await j('/api/digest'+q).catch(()=>null);
  if(!d){ document.getElementById('digestPanel').innerHTML=''; return; }
  const up = d.cost_delta_pct>=0;
  const delta = isFinite(d.cost_delta_pct) ? `${up?'▲':'▼'} ${Math.abs(d.cost_delta_pct).toFixed(0)}%` : '—';
  document.getElementById('digestPanel').innerHTML =
    `<div class="lbl">Digest 7 ngày qua</div>
     <div class="kpis">
       <div class="kpi"><div class="k">Sessions</div><div class="v">${fmt(d.sessions)}</div></div>
       <div class="kpi"><div class="k">Cost</div><div class="v tcost">${money(d.cost)}</div></div>
       <div class="kpi"><div class="k">vs tuần trước</div><div class="v" style="color:${up?'var(--red)':'var(--green)'}">${delta}</div></div>
       <div class="kpi"><div class="k">Tiết kiệm cache</div><div class="v tcache">${money(d.savings)}</div></div>
     </div>`;
}

async function loadRightsizing(project){
  const q = '?'+rq()+(project ? ('&project='+encodeURIComponent(project)) : '');
  const rows = await j('/api/model-rightsizing'+q).catch(()=>[]);
  if(!rows.length){ document.getElementById('rightsizePanel').innerHTML=''; return; }
  const totSave = rows.reduce((a,r)=>a+(r.has_opus?r.save_haiku:0),0);
  let html = `<div class="lbl">Model right-sizing — cost theo nhóm việc vs model rẻ hơn
    <span class="note">[Inference] heuristic, không phải khuyến nghị tuyệt đối</span></div>
    <table><thead><tr><th>Nhóm việc</th><th class="num">events</th><th class="num">cost hiện tại</th>
      <th class="num">nếu Sonnet</th><th class="num">nếu Haiku</th><th class="num">tiết kiệm tối đa</th></tr></thead><tbody>`;
  for(const r of rows){
    const save = r.has_opus ? r.save_haiku : 0;
    const flag = r.has_opus && save>0.05 ? ' '+ic('bulb',14) : '';
    html += `<tr style="cursor:default"><td>${esc(r.category)}${flag}</td>
      <td class="num">${fmt(r.events)}</td>
      <td class="num tcost">${money(r.current_cost)}</td>
      <td class="num">${money(r.as_sonnet)}</td>
      <td class="num">${money(r.as_haiku)}</td>
      <td class="num" style="color:${save>0.05?'var(--amber)':'var(--muted)'}">${money(save)}</td></tr>`;
  }
  html += `</tbody></table>`;
  if(totSave>0.05) html += `<div class="finding sev-med">${ic('bulb',14)} Nếu các nhóm việc đơn giản dùng Haiku thay Opus, ước tính tiết kiệm tới ${money(totSave)} (theo token đã ghi).</div>`;
  document.getElementById('rightsizePanel').innerHTML = html;
}

async function loadLive(project, c){
  // dựng khung 1 lần; các lần refresh sau chỉ thay #liveCards (đỡ giật/flicker)

    c.innerHTML = `<div class="lbl">Session hoạt động trong 10 phút qua — tự cập nhật
      <span class="note">near-realtime ~1–2s</span></div><div id="liveCards"></div>`;
  }
  const cards = document.getElementById('liveCards'); if(!cards) return;
  const q = '?mins=10'+(project ? ('&project='+encodeURIComponent(project)) : '');
  const rows = await j('/api/live'+q).catch(()=>[]);
  if(!rows.length){ cards.innerHTML = `<div class="empty">${ic('live',32)}<div>Không có session nào đang chạy.<br>Mở Claude Code và thao tác để thấy nó hiện lên đây.</div></div>`; return; }
  const now = Date.now();
  cards.innerHTML = rows.map(s=>{
    const ageMs = s.last_activity ? (now - new Date(s.last_activity).getTime()) : 1e12;
    const running = ageMs < 90000; // <90s coi như đang chạy
    const dot = running ? '<span class="dot live"></span>' : '<span class="dot" style="background:var(--amber)"></span>';
    const age = ageMs<60000 ? Math.round(ageMs/1000)+'s trước' : Math.round(ageMs/60000)+'m trước';
    const act = (s.last_action||'').replace(/\s+/g,' ').slice(0,90);
    const tl = s.last_tool ? `${ic('wrench',13)} ${esc(s.last_tool)}` : ic('message',13);
    return `<div class="livecard" onclick='openSession(${JSON.stringify(s.session_id)})'>
      <div class="lc-top">
        ${dot}
        <b class="mono">${shortId(s.session_id)}</b>
        <span class="pill">${esc(s.project||'(không rõ)')}</span>
        <span class="pill">${esc(s.git_branch||'—')}</span>
        ${s.model?`<span class="pill">${esc(s.model)}</span>`:''}
        <span class="time" style="margin-left:auto;color:var(--muted);font-size:12px">${age}</span>
      </div>
      <div class="lc-act">${tl} · <span class="toks-mini">${esc(act)||'—'}</span></div>
      <div class="lc-meta">
        <span class="tin">in ${fmt(s.input_tokens)}</span> ·
        <span class="tout">out ${fmt(s.output_tokens)}</span> ·
        <span class="tcache">cached ${fmt(s.cache_read_tokens)}</span> ·
        <span class="tcost">${money(s.cost_usd)}</span> ·
        ${fmt(s.events)} events</div>
    </div>`;
  }).join('');
}

  for(let h=0;h<24;h++) html += `<div class="heath">${h%3===0?h:''}</div>`;
  html += `</div>`;
  for(let d=0;d<7;d++){
    html += `<div class="heatrow"><div class="heatlbl">${days[d]}</div>`;
    for(let h=0;h<24;h++){ const c=grid[d+'-'+h]||0; const op=c?(0.18+0.82*c/max):0;
      html += `<div class="heatcell" title="${days[d]} ${h}h: ${c}" style="background:${c?`color-mix(in srgb,var(--accent) ${Math.round(op*100)}%,transparent)`:'var(--surface-3)'}"></div>`; }

  }

async function openSession(id){
  activeSession = id;
  const enc = encodeURIComponent(id);
  const [evs, prompts, models, fric, errs, otel, sess] = await Promise.all([
    j('/api/sessions/'+enc+'/events'),
    j('/api/sessions/'+enc+'/prompts').catch(()=>[]),
    j('/api/sessions/'+enc+'/models').catch(()=>[]),
    j('/api/sessions/'+enc+'/friction').catch(()=>[]),
    j('/api/sessions/'+enc+'/errors').catch(()=>[]),
    j('/api/sessions/'+enc+'/otel').catch(()=>({})),
    j('/api/sessions?range=all').catch(()=>[])
  ]);
  const meta = (sess||[]).find(s=>s.session_id===id) || {};
  replayEvs = evs;
  const back = activeRepo===null ? 'selectRepo(null)' : `selectRepo(${JSON.stringify(activeRepo)})`;
  let html = `<div class="crumbs"><a onclick="${back}">← Sessions</a> <span style="color:var(--muted)">/</span> <b class="mono">${esc(id)}</b>
      <span style="margin-left:auto;display:flex;gap:7px">
      <button class="btn ${autoFollow?'active':''}" id="followBtn" onclick='toggleFollow(event)'>${autoFollow?ic('record',13)+' Đang theo dõi':ic('circle',13)+' Theo dõi'}</button>
      <button class="btn" onclick='openReplay(event)'>${ic('play',14)} Replay</button>
      <button class="btn" onclick='summarize(${JSON.stringify(id)},event)'>${ic('sparkles',14)} Tóm tắt</button>
      </span></div>
      <div id="summaryBox"></div>`;
  // tag & outcome
  html += `<div style="margin:4px 0 12px">
      <input class="taginput" id="tagIn" placeholder="tag (vd: bugfix, feature)" value="${esc(meta.tag||'')}">
      <select class="taginput" id="outIn">
        <option value="">— outcome —</option>
        ${['success','partial','fail'].map(o=>`<option ${meta.outcome===o?'selected':''}>${o}</option>`).join('')}
      </select>
      <button class="btn" id="tagSave" onclick='saveTag(${JSON.stringify(id)})'>Lưu</button></div>`;
  // OTEL (cost chính xác + LOC/commits) nếu có
  if(otel && (otel.otel_cost || otel.loc_added || otel.loc_removed || otel.commits)){
    html += `<div class="finding sev-low" style="border-left-color:var(--green)">OTEL:
      cost <b class="tcost">${money(otel.otel_cost)}</b> ·
      LOC <span class="tin">+${fmt(otel.loc_added)}</span>/<span style="color:var(--red)">-${fmt(otel.loc_removed)}</span> ·
      commits ${fmt(otel.commits)} · PR ${fmt(otel.prs)}</div>`;
  }
  // breakdown theo model (đổi model giữa session)
  if(models.length){
    html += `<div class="lbl">Theo model${models.length>1?' — session này dùng nhiều model':''}</div>
      <table><thead><tr><th>Model</th><th class="num">events</th><th class="num">in</th><th class="num">out</th><th class="num">cached</th><th class="num">cost</th></tr></thead><tbody>`;
    for(const m of models){
      html += `<tr style="cursor:default"><td><span class="pill">${esc(m.model)}</span></td>
        <td class="num">${fmt(m.events)}</td><td class="num tin">${fmt(m.input_tokens)}</td>
        <td class="num tout">${fmt(m.output_tokens)}</td><td class="num tcache">${fmt(m.cache_read_tokens)}</td>
        <td class="num tcost">${money(m.cost_usd)}</td></tr>`;
    }
    html += `</tbody></table>`;
  }
  // friction / loop
  if(fric.length){
    html += `<div class="lbl">Friction / loop</div>`;
    for(const f of fric) html += `<div class="finding sev-${f.severity}">${esc(f.text)}</div>`;
  }
  // errors (debug nhanh)
  if(errs.length){
    html += `<div class="lbl">Lỗi (${errs.length})</div>`;
    for(const e of errs.slice(0,15)){
      html += `<div class="ev open think" style="border-left-color:var(--red)"><div class="head"><span class="role" style="color:var(--red)">${ic('alert',12)} error</span><span class="time">${tstr(e.ts)}</span></div><div class="body"><pre>${esc(e.snippet)}</pre></div></div>`;
    }
  }
  // cost burn timeline — cost tích luỹ theo turn, đánh dấu turn đắt nhất
  {
    const costed = evs.map((e,i)=>({i, c:e.cost_usd||0, ts:e.ts})).filter(x=>x.c>0);
    if(costed.length>=3){
      const total = costed.reduce((a,x)=>a+x.c,0);
      const maxC = Math.max(...costed.map(x=>x.c));
      const peak = costed.reduce((a,x)=>x.c>a.c?x:a, costed[0]);
      let bars = costed.map(x=>{
        const h = Math.round(x.c/maxC*64)+2;
        const top = x===peak;
        return `<div class="bar" title="turn #${x.i+1} · ${money(x.c)}${top?' (đắt nhất)':''}">
                  <div class="barfill" style="height:${h}px${top?';background:var(--red)':''}"></div></div>`;
      }).join('');
      html += `<div class="lbl">Cost burn — chi phí theo turn
        <span class="note">tổng ${money(total)} · đắt nhất ${money(peak.c)} (turn #${peak.i+1})</span></div>
        <div class="bars">${bars}</div>`;
    }
  }
  // breakdown theo prompt
  if(prompts.length){
    html += `<div class="lbl">Breakdown theo prompt (${prompts.length})</div>
      <table><thead><tr><th>Prompt</th><th class="num">turns</th><th class="num">tools</th>
        <th class="num">in</th><th class="num">out</th><th class="num">cached</th>
        <th class="num" title="số bước reasoning (thinking block); chữ trong ngoặc là độ dài nếu version Claude Code có lưu">reasoning</th><th class="num">cost</th></tr></thead><tbody>`;
    for(const p of prompts){
      const snip = (p.prompt||'').replace(/\s+/g,' ').slice(0,60);
      const tk = p.thinking_chars||0; const tks = tk>=1000 ? ' · '+(tk/1000).toFixed(1)+'k ký tự' : (tk>0?' · '+tk+' ký tự':'');
      html += `<tr style="cursor:default"><td>${esc(snip)||'<i>—</i>'}</td>
        <td class="num">${fmt(p.turns)}</td><td class="num">${fmt(p.tool_turns)}</td>
        <td class="num tin">${fmt(p.input_tokens)}</td><td class="num tout">${fmt(p.output_tokens)}</td>
        <td class="num tcache">${fmt(p.cache_read_tokens)}</td>
        <td class="num tcache" title="${fmt(p.thinking_blocks)} bước${tks}">${fmt(p.thinking_blocks)}</td>
        <td class="num tcost">${money(p.cost_usd)}</td></tr>`;
    }
    html += `</tbody></table><div class="lbl">Timeline</div>`;
  }
  html += `<div id="timeline">`;
  if(!evs.length){ html += `<div class="empty">Chưa có event (transcript có thể chưa được tail).</div>`; }
  for(const e of evs){ html += eventCardHTML(e); }
  html += `</div>`;
  document.getElementById('main').innerHTML = html;
  // mốc để auto-follow chỉ kéo event mới hơn
  lastEventTs = evs.length ? evs[evs.length-1].ts : null;
}

// Card 1 event (dùng chung cho timeline + auto-follow).
function eventCardHTML(e){
  const role = e.role || e.kind || '';
  const hasTok = e.input_tokens||e.output_tokens||e.cache_read_tokens;
  const tk = hasTok ? `<span class="toks-mini">· <span class="tin">in ${fmt(e.input_tokens)}</span>
     <span class="tout">out ${fmt(e.output_tokens)}</span>
     <span class="tcache">cached ${fmt(e.cache_read_tokens)}</span></span>` : '';
  const tool = e.tool_name ? `<span class="pill">${ic('wrench',13)} ${esc(e.tool_name)}</span>` : '';
  const errp = e.tool_error ? `<span class="pill err">${ic('alert',12)} error</span>` : '';
  let body = '';
  if(e.thinking) body += `<div class="lbl">thinking</div><pre class="think">${esc(e.thinking)}</pre>`;
  if(e.text) body += `<div class="lbl">text</div><pre>${esc(e.text)}</pre>`;
  if(e.tool_input) body += `<div class="lbl">tool input</div><pre>${esc(e.tool_input)}</pre>`;
  if(e.tool_result) body += `<div class="lbl">tool result</div><pre>${esc(e.tool_result)}</pre>`;
  if(!body) body = `<div class="toks-mini">(không có nội dung text)</div>`;
  return `<div class="ev" onclick="this.classList.toggle('open')">
    <div class="head"><span class="role role-${role}">${esc(role)}</span>
      ${tool}${errp}<span class="time">${tstr(e.ts)}</span>
      ${e.model?`<span class="pill">${esc(e.model)}</span>`:''}${tk}</div>
    <div class="body">${body}</div></div>`;
}

function toggleFollow(ev){
  if(ev) ev.stopPropagation();
  autoFollow = !autoFollow;
  const b = document.getElementById('followBtn');
  if(b){ b.innerHTML = autoFollow?ic('record',13)+' Đang theo dõi':ic('circle',13)+' Theo dõi'; b.classList.toggle('active', autoFollow); }
  if(autoFollow) followAppend();
}

// Append CHỈ event mới vào timeline (không dựng lại trang). Chỉ tự cuộn nếu đang ở gần đáy.
async function followAppend(){
  if(!activeSession || !autoFollow || followBusy) return;
  const tl = document.getElementById('timeline'); if(!tl) return;
  followBusy = true;
  try {
    const enc = encodeURIComponent(activeSession);
    const after = lastEventTs ? ('?after='+encodeURIComponent(lastEventTs)) : '';
    const evs = await j('/api/sessions/'+enc+'/events'+after).catch(()=>[]);
    if(evs.length){
      const m = document.querySelector('main');
      const nearBottom = m && (m.scrollHeight - m.scrollTop - m.clientHeight < 140);
      tl.insertAdjacentHTML('beforeend', evs.map(eventCardHTML).join(''));
      lastEventTs = evs[evs.length-1].ts || lastEventTs;
      if(nearBottom && m) m.scrollTop = m.scrollHeight; // chỉ cuộn khi user đang theo dõi đáy
    }
  } finally { followBusy = false; }
}

// Session replay — tua từng bước prompt → thinking → tool → result.
function openReplay(ev){
  if(ev) ev.stopPropagation();
  if(!replayEvs.length) return;
  replayIdx = 0;
  if(!document.getElementById('replayOverlay')){
    const ov = document.createElement('div');
    ov.id = 'replayOverlay'; ov.className = 'overlay';
    ov.innerHTML = `<div class="replay">
        <div class="rhead">
          <b>${ic('play',14)} Replay</b>
          <span id="rPos" class="toks-mini"></span>
          <span style="margin-left:auto"></span>
          <button class="btn" onclick="replayStep(-1)">‹ Trước</button>
          <button class="btn" onclick="replayStep(1)">Sau ›</button>
          <button class="btn" onclick="closeReplay()">✕</button>
        </div>
        <div id="rBody" class="rbody"></div>
      </div>`;
    ov.onclick = e => { if(e.target===ov) closeReplay(); };
    document.body.appendChild(ov);
    document.addEventListener('keydown', replayKey);
  }
  document.getElementById('replayOverlay').style.display = 'flex';
  renderReplay();
}
function replayKey(e){
  if(!document.getElementById('replayOverlay') || document.getElementById('replayOverlay').style.display==='none') return;
  if(e.key==='ArrowRight') replayStep(1);
  else if(e.key==='ArrowLeft') replayStep(-1);
  else if(e.key==='Escape') closeReplay();
}
function replayStep(d){ replayIdx = Math.max(0, Math.min(replayEvs.length-1, replayIdx+d)); renderReplay(); }
function closeReplay(){ const o=document.getElementById('replayOverlay'); if(o) o.style.display='none'; }
function renderReplay(){
  const e = replayEvs[replayIdx]; if(!e) return;
  document.getElementById('rPos').textContent = `${replayIdx+1} / ${replayEvs.length} · ${tstr(e.ts)}`;
  const role = e.role || e.kind || '';
  let body = `<div class="head"><span class="role role-${role}">${esc(role)}</span>
    ${e.tool_name?`<span class="pill">${ic('wrench',13)} ${esc(e.tool_name)}</span>`:''}
    ${e.tool_error?`<span class="pill err">${ic('alert',12)} error</span>`:''}
    ${e.model?`<span class="pill">${esc(e.model)}</span>`:''}
    ${e.cost_usd?`<span class="toks-mini tcost">${money(e.cost_usd)}</span>`:''}</div>`;
  if(e.thinking) body += `<div class="lbl">thinking</div><pre class="think">${esc(e.thinking)}</pre>`;
  if(e.text) body += `<div class="lbl">text</div><pre>${esc(e.text)}</pre>`;
  if(e.tool_input) body += `<div class="lbl">tool input</div><pre>${esc(e.tool_input)}</pre>`;
  if(e.tool_result) body += `<div class="lbl">tool result</div><pre>${esc(e.tool_result)}</pre>`;
  if(!e.thinking && !e.text && !e.tool_input && !e.tool_result) body += `<div class="toks-mini">(không có nội dung text)</div>`;
  document.getElementById('rBody').innerHTML = body;
}

async function doSearch(){
  const term = document.getElementById('search').value.trim();
  if(!term){ selectRepo(activeRepo); return; }
  activeSession = null;
  const q = '?q='+encodeURIComponent(term)+'&'+rq()+(activeRepo?('&project='+encodeURIComponent(activeRepo)):'');
  const rows = await j('/api/search'+q);
  let html = `<div class="crumbs">Tìm "<b>${esc(term)}</b>" — ${rows.length} kết quả</div>`;
  if(!rows.length) html += `<div class="empty">Không có kết quả.</div>`;
  for(const r of rows){
    html += `<div class="ev open" style="cursor:pointer" onclick='openSession(${JSON.stringify(r.session_id)})'>
      <div class="head"><span class="role role-${r.role||''}">${esc(r.role||'')}</span>
        ${r.tool_name?`<span class="pill">${ic('wrench',13)} ${esc(r.tool_name)}</span>`:''}
        <span class="time">${tstr(r.ts)}</span><span class="pill">${esc(r.project||'')}</span>
        <span class="mono toks-mini">${shortId(r.session_id)}</span></div>
      <div class="body"><pre>${esc(r.snippet)}</pre></div></div>`;
  }
  document.getElementById('main').innerHTML = html;
}

async function openInsights(){
  activeSession = null;
  const list = await j('/api/insights').catch(()=>[]);
  const scope = activeRepo ? esc(activeRepo) : 'tất cả repo';
  let html = `<div class="crumbs">${ic('bulb',14)} Cross-session insight — phạm vi <b>${scope}</b>
     <span style="margin-left:auto"><button class="btn primary" onclick="runAnalyze()">${ic('settings',14)} Phân tích ngay (LLM)</button></span></div>
     <div id="analyzeBox"></div>`;
  if(list.length){
    html += `<div class="lbl">Insight đã lưu</div>`;
    for(const it of list){
      html += `<div class="ev open think"><div class="head"><span class="role">${esc(it.scope||'')}</span><span class="time">${tstr(it.created_at)}</span></div>
        <div class="body"><pre>${esc(it.content)}</pre></div></div>`;
    }
  } else html += `<div class="empty">Chưa có insight. Bấm "Phân tích ngay" (cần ANTHROPIC_API_KEY).</div>`;
  document.getElementById('main').innerHTML = html;
}
async function runAnalyze(){
  const box = document.getElementById('analyzeBox');
  box.innerHTML = `<div class="ev open"><div class="body"><div class="toks-mini">Đang phân tích bằng LLM…</div></div></div>`;
  const q = activeRepo ? ('?project='+encodeURIComponent(activeRepo)) : '';
  try {
    const r = await fetch('/api/insights/analyze'+q, {method:'POST'});
    const t = await r.text();
    if(!r.ok){ box.innerHTML = `<div class="ev open think"><div class="body"><pre>${esc(t)}</pre></div></div>`; return; }
    const d = JSON.parse(t);
    box.innerHTML = `<div class="ev open think"><div class="head"><span class="role">${ic('bulb',14)} ${esc(d.scope)}</span></div><div class="body"><pre>${esc(d.content)}</pre></div></div>`;
  } catch(e){ box.innerHTML = `<div class="ev open"><div class="body"><pre>${esc(e.message)}</pre></div></div>`; }
}
async function saveTag(id){
  const tag = document.getElementById('tagIn').value, outcome = document.getElementById('outIn').value;
  await fetch('/api/sessions/'+encodeURIComponent(id)+'/tag', {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({tag, outcome})});
  const btn = document.getElementById('tagSave'); if(btn){ btn.textContent='✓ Đã lưu'; setTimeout(()=>btn.textContent='Lưu',1500); }
}

let refreshTimer = null;
async function refreshCurrent(){
  // Refresh tăng dần, KHÔNG dựng lại cả trang (tránh giật):
  //  - đang mở session: chỉ append event mới nếu bật auto-follow
  //  - đang ở tab live: chỉ thay #liveCards
  //  - tab khác: nạp lại nội dung tab (không đụng sidebar)
  try {
    loadTotals();
    if(activeSession){ if(autoFollow) followAppend(); return; }
    const c = document.getElementById('tabContent');
    if(!c) return; // đang ở search/insights → không đụng để khỏi mất kết quả
    if(activeTab==='live'){ loadLive(activeRepo, c); }
    else { loadTab(activeRepo); }
  } catch(e){ console.error(e); }
}
function liveDebounced(){ clearTimeout(refreshTimer); refreshTimer = setTimeout(refreshCurrent, 600); }

function connectWS(){
  try {
    const ws = new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ws');
    ws.onmessage = () => liveDebounced();
    ws.onclose = () => setTimeout(connectWS, 3000); // tự kết nối lại
  } catch(e){ setTimeout(connectWS, 3000); }
}

(async function init(){
  let saved='dark'; try{ saved = localStorage.getItem('al-theme')||'dark'; }catch(e){}
  applyTheme(saved);
  try { await loadTotals(); await loadRepos(); await selectRepo(null); }
  catch(e){ document.getElementById('main').innerHTML = `<div class="empty">Lỗi: ${esc(e.message)}</div>`; }
  connectWS();                       // live update qua WebSocket
  setInterval(loadTotals, 8000);     // fallback poll tổng
})();
</script>
