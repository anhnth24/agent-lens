name: AgentLens Desktop Build

# Build app desktop (Tauri) cho macOS (Apple Silicon + Intel) và Windows.
# Tauri KHÔNG cross-compile macOS -> phải build trên runner macOS thật.
#  • workflow_dispatch  -> build thử, upload artifact (KHÔNG release, KHÔNG ký).
#  • push tag agentlens-v* -> tauri-action: build + KÝ updater + tạo Release + latest.json.
on:
  workflow_dispatch:
  push:
    tags: ['agentlens-v*']

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write   # tạo GitHub Release khi push tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,   target: aarch64-apple-darwin,   label: macos-arm64 }
          - { os: macos-latest,   target: x86_64-apple-darwin,    label: macos-intel }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, label: windows-x64 }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agentlens/desktop/src-tauri -> target

      # ---------- TAG: build + ký + Release + latest.json (cho auto-update) ----------
      - name: Build, sign & release (tauri-action)
        if: startsWith(github.ref, 'refs/tags/agentlens-v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: agentlens/desktop
          tagName: ${{ github.ref_name }}
          releaseName: AgentLens ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}

      # ---------- DISPATCH: build thử + upload artifact (không ký, không release) ----------
      - name: Install Tauri CLI
        if: github.event_name == 'workflow_dispatch'
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli

      - name: Build desktop bundle
        if: github.event_name == 'workflow_dispatch'
        working-directory: agentlens/desktop/src-tauri
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: agentlens-${{ matrix.label }}
          if-no-files-found: error
          path: |
            agentlens/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            agentlens/target/${{ matrix.target }}/release/bundle/macos/*.app
            agentlens/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            agentlens/target/${{ matrix.target }}/release/bundle/msi/*.msi
