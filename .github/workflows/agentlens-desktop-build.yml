name: AgentLens Desktop Build

# Build app desktop (Tauri) cho macOS (Apple Silicon + Intel) và Windows.
# Tauri KHÔNG cross-compile macOS -> phải build trên runner macOS thật.
# Kích hoạt thủ công (Actions -> Run workflow) hoặc khi push tag `agentlens-v*`.
on:
  workflow_dispatch:
  push:
    tags: ['agentlens-v*']

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write   # cần để tạo GitHub Release khi push tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,   target: aarch64-apple-darwin,   label: macos-arm64 }
          - { os: macos-latest,   target: x86_64-apple-darwin,    label: macos-intel }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, label: windows-x64 }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agentlens/desktop/src-tauri -> target

      # cài tauri-cli bằng binary prebuilt (không phụ thuộc cargo metadata
      # nên không bị rust-cache khôi phục "đã cài" nhưng thiếu binary)
      - name: Install Tauri CLI
        uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli

      - name: Build desktop bundle
        working-directory: agentlens/desktop/src-tauri
        run: cargo tauri build --target ${{ matrix.target }}

      # Lưu ý: agentlens-desktop dùng chung target dir với crate `agentlens`
      # nên bundle nằm ở agentlens/target/<triple>/... (KHÔNG phải desktop/src-tauri/target).
      - uses: actions/upload-artifact@v4
        with:
          name: agentlens-${{ matrix.label }}
          if-no-files-found: error
          path: |
            agentlens/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            agentlens/target/${{ matrix.target }}/release/bundle/macos/*.app
            agentlens/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            agentlens/target/${{ matrix.target }}/release/bundle/msi/*.msi

      # Khi push tag agentlens-v* -> tạo/ghi GitHub Release + đính kèm bộ cài
      # (.app là thư mục nên không upload; dmg đã chứa app). App check-update đối chiếu tag này.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/agentlens-v')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            agentlens/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            agentlens/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            agentlens/target/${{ matrix.target }}/release/bundle/msi/*.msi
